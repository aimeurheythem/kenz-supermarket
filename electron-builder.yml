appId: com.supermarketpro.app
productName: SuperMarket Pro
directories:
  output: dist
  buildResources: build
files:
  - from: .
    filter:
      - package.json
      - electron/**/*
      - dist/**/*
      - database/**/*
      - node_modules/**/*
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
mac:
  target: dmg
  icon: build/icon.icns
  category: public.app-category.business
publish:
  provider: github
  owner: your-org
  repo: super-market
  releaseType: release
